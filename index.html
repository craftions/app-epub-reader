<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB Reader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <div class="toolbar-group">
                <button id="prev-btn" disabled>◀</button>
                <button id="next-btn" disabled>▶</button>
                <span id="chapter-info">0 / 0</span>
            </div>

            <div class="toolbar-group grow">
                <label for="chapter-select" data-i18n="jumpTo">Ir a</label>
                <select id="chapter-select" disabled></select>
            </div>

            <div id="settings" class="toolbar-group">
                <label for="font-size" class="icon-label" title="Tamaño">🔎</label>
                <select id="font-size" title="Font size">
                    <option value="16px">A-</option>
                    <option value="18px" selected>A</option>
                    <option value="20px">A+</option>
                    <option value="24px">A++</option>
                    <option value="28px">A+++</option>
                </select>

                <label for="font-family" class="icon-label" title="Tipografía">🅰</label>
                <select id="font-family" title="Font family">
                    <option value="Georgia, serif">Serif</option>
                    <option value="'Trebuchet MS', sans-serif" selected>Sans</option>
                    <option value="'Courier New', monospace">Mono</option>
                </select>

                <button id="theme-light" title="Light">☀</button>
                <button id="theme-dark" title="Dark" class="active">☾</button>

                <select id="lang-select" title="Language">
                    <option value="en" selected>🇺🇸 English</option>
                    <option value="es">🇪🇸 Espanol</option>
                </select>
            </div>
        </header>

        <div id="content-wrap">
            <aside id="toc-panel">
                <h2 data-i18n="toc">Indice</h2>
                <nav id="toc-list"></nav>
            </aside>

            <main id="content">
                <div id="welcome-screen">
                    <h1>EPUB Reader</h1>
                    <p data-i18n="uploadPrompt">Sube un archivo EPUB para comenzar a leer</p>
                    <input type="file" id="file-input" accept=".epub,application/epub+zip">
                    <label for="file-input" id="upload-label" data-i18n="uploadCta">Elegir archivo EPUB</label>
                </div>
                <article id="reader-content"></article>
            </main>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/epub-reader.js"></script>
</body>
</html>
