<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafted EPUB Reader</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <div class="toolbar-left">
                <div class="hamburger-wrap">
                    <button id="hamburger-btn" type="button" title="Toggle contents"
                            aria-label="Toggle contents" aria-controls="toc-list" aria-expanded="true">
                        <span class="hamburger-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </div>

            <div id="settings" class="toolbar-group">
                <select id="font-size" title="Font size">
                    <option value="16px">A-</option>
                    <option value="18px" selected>A</option>
                    <option value="20px">A+</option>
                    <option value="24px">A++</option>
                    <option value="28px">A+++</option>
                </select>

                <select id="font-family" title="Font family">
                    <option value="Georgia, serif">Serif</option>
                    <option value="'Trebuchet MS', sans-serif" selected>Sans</option>
                    <option value="'Courier New', monospace">Mono</option>
                </select>

                <button id="theme-light" title="Light">☀</button>
                <button id="theme-dark" title="Dark" class="active">☾</button>

                <select id="lang-select" title="Language">
                    <option value="en" selected>🇺🇸 English</option>
                    <option value="es">🇪🇸 Español</option>
                </select>
            </div>
        </header>

        <div id="content-wrap">
            <aside id="toc-panel">
                <div class="toc-header">
                    <h2 data-i18n="toc">Contents</h2>
                </div>
                <nav id="toc-list"></nav>
            </aside>

            <main id="content">
                <div id="welcome-screen">
                    <img class="welcome-logo"
                         src="https://www.gravatar.com/avatar/d8a6d35ad4b971a4e96acd7da66420c5?s=80&r=g&d=mm"
                         alt="craftions.io">
                    <h1>Crafted with <span class="heart" aria-hidden="true">♥</span></h1>
                    <p data-i18n="uploadPrompt">Upload an EPUB file to start reading</p>
                    <input type="file" id="file-input" accept=".epub,application/epub+zip">
                    <label for="file-input" id="upload-label" data-i18n="uploadCta">Choose EPUB file</label>
                </div>
                <article id="reader-content"></article>
            </main>
        </div>

        <footer id="footer">
            <div class="footer-nav">
                <button id="prev-btn" disabled>◀</button>
                <span id="chapter-info">0/0</span>
                <button id="next-btn" disabled>▶</button>
            </div>
        </footer>
    </div>
    
    <script src="js/jszip.min.js"></script>
    <script src="js/epub-reader.js"></script>
</body>
</html>
